<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keycloak Spring Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 40px 48px;
            max-width: 480px;
            width: 100%;
        }
        .avatar {
            width: 64px; height: 64px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; font-weight: 700;
            margin: 0 auto 20px;
        }
        h1 { text-align: center; color: #111; font-size: 22px; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 28px; }
        .info-row {
            display: flex; gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 15px;
        }
        .info-row:last-of-type { border-bottom: none; }
        .label { color: #6b7280; min-width: 80px; font-weight: 500; }
        .value { color: #111; word-break: break-all; }
        .roles { display: flex; flex-wrap: wrap; gap: 6px; }
        .role-badge {
            background: #ede9fe; color: #4f46e5;
            padding: 2px 10px; border-radius: 20px;
            font-size: 13px; font-weight: 500;
        }
        .logout-btn {
            display: block; width: 100%; margin-top: 28px;
            padding: 11px;
            background: #4f46e5; color: white;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; text-align: center;
            text-decoration: none;
        }
        .logout-btn:hover { background: #4338ca; }
    </style>
</head>
<body>
<div class="card">
    <div class="avatar" th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">U</div>
    <h1 th:text="'Welcome, ' + ${fullName} + '!'">Welcome!</h1>
    <p class="subtitle">You are logged in via Keycloak</p>

    <div class="info-row">
        <span class="label">Username</span>
        <span class="value" th:text="${username}">-</span>
    </div>
    <div class="info-row">
        <span class="label">Email</span>
        <span class="value" th:text="${email}">-</span>
    </div>
    <div class="info-row">
        <span class="label">Roles</span>
        <div class="roles">
            <span class="role-badge" th:each="role : ${roles}" th:text="${role}">ROLE</span>
        </div>
    </div>

    <a href="/logout" class="logout-btn">Sign Out</a>
</div>
</body>
</html>
